<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selwa — Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" /><link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<header class="site-header">
    <div class="wrap header-wrap">
        <a class="logo" href="index.html">Selwa</a>
        <nav class="main-nav">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="products.html">Products</a>
            <a class="nav-link" href="artisans.html">Artisans</a>
            <a class="nav-link" href="about.html">About</a>
        </nav>
    </div>
</header>
<div class="auth-shell">
    <aside class="auth-panel">
        <div class="auth-panel-img"><img src="images/selwa.bt.jpeg" alt="Bhutanese craft" /></div>
        <div class="auth-panel-copy">
            <span class="section-label">New membership</span>
            <p class="auth-panel-quote">Join a marketplace built around material, place, and maker identity.</p>
            <p>Create an account to save favourites, track orders, and follow artisans behind the collection.</p>
        </div>
    </aside>
    <section class="auth-card">
        <p class="auth-kicker">Create account</p>
        <h1 class="auth-title">Become part of Selwa</h1>
        <form id="signup-form" class="auth-form" novalidate>
            <div>
                <label class="auth-label" for="full-name">Full name</label>
                <input type="text" id="full-name" class="auth-input" placeholder="Your full name" autocomplete="name" required />
            </div>
            <div>
                <label class="auth-label" for="signup-email">Email address</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope input-ico"></i>
                    <input type="email" id="signup-email" class="auth-input with-ico" placeholder="you@example.com" autocomplete="email" required />
                </div>
            </div>
            <div>
                <label class="auth-label" for="password">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock input-ico"></i>
                    <input type="password" id="password" class="auth-input with-ico" placeholder="Create a strong password" autocomplete="new-password" required />
                    <button type="button" class="pwd-toggle" data-target="password"><i class="bi bi-eye"></i></button>
                </div>
                <div class="str-bar"><div class="str-fill" id="strength-fill"></div></div>
                <div class="str-text" id="strength-text"></div>
            </div>
            <div>
                <label class="auth-label" for="confirm-password">Confirm password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock input-ico"></i>
                    <input type="password" id="confirm-password" class="auth-input with-ico" placeholder="Repeat your password" autocomplete="new-password" required />
                    <button type="button" class="pwd-toggle" data-target="confirm-password"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <label class="auth-check">
                <input type="checkbox" id="terms" class="form-check-input mt-1" />
                <span>I agree to Selwa's <a href="terms.html">terms of use</a> and <a href="privacy.html">privacy policy</a>.</span>
            </label>
            <button type="submit" class="btn btn-primary auth-sub">Create account</button>
        </form>
        <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
    </section>
</div>
<script src="javascript/global.js"></script>
<script src="javascript/auth.js"></script>
</body>
</html>
