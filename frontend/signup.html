<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — Selwa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <!-- Left panel -->
      <div class="auth-panel">
        <img
          class="auth-panel__img"
          src="images/selwa.bt.jpeg"
          alt="Selwa artisan market"
        />
        <div class="auth-panel__logo">Selwa</div>
        <div class="auth-panel__tagline">Himalayan Artisan Marketplace</div>
        <div class="auth-panel__quote">
          "Each thread tells the story of a mountain, a season, a life well
          lived."
        </div>
      </div>

      <!-- Right form panel -->
      <div class="auth-form-panel">
        <div class="auth-form-inner">
          <div class="auth-mobile-logo">Selwa</div>

          <h1 class="auth-title">Create your account</h1>
          <p class="auth-subtitle">
            Join Selwa and support Bhutanese artisans directly.
          </p>

          <form id="signup-form" novalidate>
            <label class="auth-label" for="full-name">Full name</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-person auth-input-icon"></i>
              <input
                type="text"
                id="full-name"
                class="auth-input with-icon"
                placeholder="Your full name"
                autocomplete="name"
                required
              />
            </div>

            <label class="auth-label" for="signup-email">Email address</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-envelope auth-input-icon"></i>
              <input
                type="email"
                id="signup-email"
                class="auth-input with-icon"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>

            <label class="auth-label" for="password">Password</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-lock auth-input-icon"></i>
              <input
                type="password"
                id="password"
                class="auth-input with-icon"
                placeholder="Create a strong password"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="password-toggle"
                data-target="password"
                aria-label="Toggle password"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <div class="strength-text" id="strength-text"></div>

            <label
              class="auth-label"
              for="confirm-password"
              style="margin-top: 14px"
              >Confirm password</label
            >
            <div class="auth-input-wrapper">
              <i class="bi bi-lock-fill auth-input-icon"></i>
              <input
                type="password"
                id="confirm-password"
                class="auth-input with-icon"
                placeholder="Repeat your password"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="password-toggle"
                data-target="confirm-password"
                aria-label="Toggle password"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>

            <div class="auth-check" style="margin-top: 14px">
              <input type="checkbox" id="terms" />
              <label for="terms"
                >I agree to Selwa's
                <a href="terms.html">Terms of Service</a> and
                <a href="privacy.html">Privacy Policy</a>. I understand my
                purchase supports Bhutanese artisans directly.</label
              >
            </div>

            <button type="submit" class="auth-submit">Create account</button>
          </form>

          <div class="auth-switch">
            Already have an account? <a href="login.html">Sign in</a>
          </div>

          <div style="text-align: center; margin-top: 24px">
            <a href="index.html" class="auth-back"
              ><i class="bi bi-arrow-left"></i> Back to Selwa</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/global.js"></script>
    <script src="javascript/auth.js"></script>
  </body>
</html>
