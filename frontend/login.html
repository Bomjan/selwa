<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Selwa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/hi.css">

</head>

<body>

  <div class="auth-page">

    <!-- ── Left decorative panel ── -->
    <div class="auth-panel col-md-5 col-lg-4 d-none d-md-flex">
      <div class="auth-panel-logo">Selwa</div>
      <div class="auth-panel-tagline">Authentic Bhutanese Crafts</div>
      <!-- <img src="../images/selwa.bt.jpeg" alt="Selwa" class="auth-panel-img" /> -->
      <div class="auth-panel-quote">"Each thread tells the story of a mountain, a season, a life well lived."</div>
      <div class="auth-panel-quote-author">— Bhutanese artisians tradition</div>
    </div>

    <!-- ── Right form panel ── -->
    <div class="auth-form-panel col-12 col-md-7 col-lg-8">
      <div class="auth-form-inner">

        <!-- Mobile logo -->
        <div class="auth-mobile-logo">Selwa</div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your Selwa account to continue shopping.</p>

        <form id="login-form" novalidate>

          <!-- Email -->
          <div class="mb-1">
            <label class="auth-label" for="email">Email address</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" id="email" class="auth-input with-icon" placeholder="you@example.com"
                autocomplete="email" required />
            </div>
          </div>

          <!-- Password -->
          <div class="mb-1">
            <div class="d-flex align-items-center justify-content-between mb-1">
              <label class="auth-label mb-0" for="login-password">Password</label>
              <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <i class="bi bi-lock input-icon"></i>
              <input type="password" id="login-password" class="auth-input with-icon" placeholder="Enter your password"
                autocomplete="current-password" required />
              <button type="button" class="password-toggle" data-target="login-password" aria-label="Toggle password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <!-- Remember me -->
          <div class="d-flex align-items-center gap-2 mb-3" style="margin-top:4px">
            <input type="checkbox" id="remember" class="form-check-input m-0" style="accent-color:var(--amber-dark)" />
            <label for="remember" style="font-size:0.82rem;color:var(--text-muted);cursor:pointer">Remember me for 30
              days</label>
          </div>

          <button type="submit" class="auth-submit">Sign in</button>

        </form>


        <div class="auth-switch">
          Don't have an account? <a href="signup.html">Create one for free</a>
        </div>

        <div class="text-center mt-4">
          <a href="index.html" style="font-size:0.8rem;color:var(--text-muted)">
            <i class="bi bi-arrow-left me-1"></i>Back to Selwa
          </a>
        </div>

      </div>
    </div>

  </div><!-- /auth-page -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../javascript/global.js"></script>
  <script src="../javascript/auth.js"></script>
</body>

</html>
