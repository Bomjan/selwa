<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selwa — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" /><link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<header class="site-header">
    <div class="wrap header-wrap">
        <a class="logo" href="index.html">Selwa</a>
        <nav class="main-nav">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="products.html">Products</a>
            <a class="nav-link" href="artisans.html">Artisans</a>
            <a class="nav-link" href="about.html">About</a>
        </nav>
    </div>
</header>
<div class="auth-shell">
    <aside class="auth-panel">
        <div class="auth-panel-img"><img src="images/selwa.bt.jpeg" alt="Bhutanese craft" /></div>
        <div class="auth-panel-copy">
            <span class="section-label">Member access</span>
            <p class="auth-panel-quote">Return to a calmer kind of marketplace.</p>
            <p>Sign in to browse the collection, save favourites, and manage your cart.</p>
        </div>
    </aside>
    <section class="auth-card">
        <p class="auth-kicker">Welcome back</p>
        <h1 class="auth-title">Sign in to Selwa</h1>
        <form id="login-form" class="auth-form" novalidate>
            <div>
                <label class="auth-label" for="email">Email address</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope input-ico"></i>
                    <input type="email" id="email" class="auth-input with-ico" placeholder="you@example.com" autocomplete="email" required />
                </div>
            </div>
            <div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
                    <label class="auth-label" for="login-password" style="margin-bottom:0">Password</label>
                    <a class="forgot-lnk" href="forgot-password.html">Forgot password?</a>
                </div>
                <div class="input-wrap">
                    <i class="bi bi-lock input-ico"></i>
                    <input type="password" id="login-password" class="auth-input with-ico" placeholder="Enter your password" autocomplete="current-password" required />
                    <button type="button" class="pwd-toggle" data-target="login-password"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <label class="auth-check">
                <input type="checkbox" id="remember" class="form-check-input" />
                <span>Remember me for 30 days on this device.</span>
            </label>
            <button type="submit" class="btn btn-primary auth-sub">Sign in</button>
        </form>
        <div class="auth-footer">New to Selwa? <a href="signup.html">Create an account</a></div>
    </section>
</div>
<script src="javascript/global.js"></script>
<script src="javascript/auth.js"></script>
</body>
</html>
