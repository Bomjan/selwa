<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Selwa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-page">

    <!-- Left panel -->
    <div class="auth-panel">
      <img class="auth-panel__img" src="images/selwa.bt.jpeg" alt="Selwa artisan market" />
      <div class="auth-panel__logo">Selwa</div>
      <div class="auth-panel__tagline">Himalayan Artisan Marketplace</div>
      <div class="auth-panel__quote">"Every thread tells a story. Every purchase keeps that story alive."</div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
      <div class="auth-form-inner">

        <div class="auth-mobile-logo">Selwa</div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your Selwa account to continue shopping and support Bhutanese artisans.</p>

        <form id="login-form" novalidate>

          <label class="auth-label" for="email">Email address</label>
          <div class="auth-input-wrapper">
            <i class="bi bi-envelope auth-input-icon"></i>
            <input type="email" id="email" class="auth-input with-icon" placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
            <label class="auth-label" for="login-password" style="margin-bottom:0">Password</label>
            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
          </div>
          <div class="auth-input-wrapper">
            <i class="bi bi-lock auth-input-icon"></i>
            <input type="password" id="login-password" class="auth-input with-icon" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="password-toggle" data-target="login-password" aria-label="Toggle password">
              <i class="bi bi-eye"></i>
            </button>
          </div>

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;margin-top:4px">
            <input type="checkbox" id="remember" style="accent-color:var(--gold)" />
            <label for="remember" style="font-size:.82rem;color:var(--text-muted);cursor:pointer">Remember me for 30 days</label>
          </div>

          <button type="submit" class="auth-submit">Sign in</button>

        </form>

        <div class="auth-switch">
          Don't have an account? <a href="signup.html">Create one for free</a>
        </div>

        <div style="text-align:center;margin-top:24px">
          <a href="index.html" class="auth-back"><i class="bi bi-arrow-left"></i> Back to Selwa</a>
        </div>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="javascript/global.js"></script>
  <script src="javascript/auth.js"></script>
</body>
</html>
