<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selwa — Reset Password</title>
    <meta name="description" content="Reset your Selwa account password." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
    <header class="site-header">
        <div class="shell site-header__bar">
            <a class="site-brand" href="index.html">Selwa</a>
            <div class="site-nav">
                <nav class="site-nav__links">
                    <a class="site-nav__link" href="index.html">Home</a>
                    <a class="site-nav__link" href="products.html">Products</a>
                    <a class="site-nav__link" href="artisans.html">Artisans</a>
                    <a class="site-nav__link" href="about.html">About</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="page">
        <div class="shell auth-shell">
            <aside class="auth-panel">
                <div class="auth-panel__image"><img src="images/selwa.bt.jpeg" alt="Bhutanese craft textures" /></div>
                <div class="auth-panel__copy">
                    <span class="eyebrow text-light">Account recovery</span>
                    <div class="auth-panel__quote">We will help you get back in.</div>
                    <p class="mb-0">Enter your email address and we will send you a link to reset your password.</p>
                </div>
            </aside>

            <section class="auth-card">
                <div class="auth-card__kicker">Reset access</div>
                <h1 class="auth-title">Forgot your password?</h1>
                <p class="page-lead">Enter the email address linked to your account and we will send a reset link.</p>

                <form id="forgot-password-form" class="auth-form" novalidate>
                    <div>
                        <label class="auth-label" for="forgot-email">Email address</label>
                        <div class="input-wrapper">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" id="forgot-email" class="auth-input with-icon" placeholder="you@example.com" autocomplete="email" required />
                        </div>
                    </div>
                    <button type="submit" class="button button-primary auth-submit">Send reset link</button>
                </form>

                <div class="auth-card__footer"><a href="login.html">Back to sign in</a></div>
            </section>
        </div>
    </main>

    <script src="javascript/global.js"></script>
    <script src="javascript/auth.js"></script>
</body>

</html>
