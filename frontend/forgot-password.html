<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Selwa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <!-- Left panel -->
      <div class="auth-panel">
        <img
          class="auth-panel__img"
          src="images/selwa.bt.jpeg"
          alt="Selwa artisan market"
        />
        <div class="auth-panel__logo">Selwa</div>
        <div class="auth-panel__tagline">Himalayan Artisan Marketplace</div>
        <div class="auth-panel__quote">
          "Each thread tells the story of a mountain, a season, a life well
          lived."
        </div>
      </div>

      <!-- Right form panel -->
      <div class="auth-form-panel">
        <div class="auth-form-inner">
          <div class="auth-mobile-logo">Selwa</div>

          <h1 class="auth-title">Reset your password</h1>
          <p class="auth-subtitle">
            Enter your email address and we'll send you a link to reset your
            password.
          </p>

          <form id="forgot-password-form" novalidate>
            <label class="auth-label" for="forgot-email">Email address</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-envelope auth-input-icon"></i>
              <input
                type="email"
                id="forgot-email"
                class="auth-input with-icon"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>

            <button type="submit" class="auth-submit">Send reset link</button>
          </form>

          <div class="auth-switch">
            Remember your password? <a href="login.html">Sign in</a>
          </div>

          <div style="text-align: center; margin-top: 24px">
            <a href="index.html" class="auth-back"
              ><i class="bi bi-arrow-left"></i> Back to Selwa</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/global.js"></script>
    <script src="javascript/auth.js"></script>
  </body>
</html>
