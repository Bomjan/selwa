<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Selwa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/hi.css" />
</head>

<body>

  <div class="auth-page">

    <!-- ── Left decorative panel ── -->
    <div class="auth-panel col-md-5 col-lg-4 d-none d-md-flex">
      <div class="auth-panel-logo">Selwa</div>
      <div class="auth-panel-tagline">Authentic Bhutanese Crafts</div>
      <div class="auth-panel-quote">"Each thread tells the story of a mountain, a season, a life well lived."</div>
      <div class="auth-panel-quote-author">— Bhutanese artisan tradition</div>
    </div>

    <!-- ── Right form panel ── -->
    <div class="auth-form-panel col-12 col-md-7 col-lg-8">
      <div class="auth-form-inner">

        <!-- Mobile logo -->
        <div class="auth-mobile-logo">Selwa</div>

        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Join Selwa and support Bhutanese artisans directly.</p>

        <form id="signup-form" novalidate>

          <!-- Full name -->
          <div class="mb-1">
            <label class="auth-label" for="full-name">Full name</label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input type="text" id="full-name" class="auth-input with-icon" placeholder="Your full name"
                autocomplete="name" required />
            </div>
          </div>

          <!-- Email -->
          <div class="mb-1">
            <label class="auth-label" for="signup-email">Email address</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" id="signup-email" class="auth-input with-icon" placeholder="you@example.com"
                autocomplete="email" required />
            </div>
          </div>

          <!-- Password -->
          <div class="mb-1">
            <label class="auth-label" for="password">Password</label>
            <div class="input-wrapper">
              <i class="bi bi-lock input-icon"></i>
              <input type="password" id="password" class="auth-input with-icon" placeholder="Create a strong password"
                autocomplete="new-password" required />
              <button type="button" class="password-toggle" data-target="password" aria-label="Toggle password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <!-- Strength meter -->
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <div class="strength-text" id="strength-text"></div>
          </div>

          <!-- Confirm password -->
          <div class="mb-1" style="margin-top:14px">
            <label class="auth-label" for="confirm-password">Confirm password</label>
            <div class="input-wrapper">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" id="confirm-password" class="auth-input with-icon"
                placeholder="Repeat your password" autocomplete="new-password" required />
              <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Toggle password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <!-- Terms -->
          <div class="auth-check" style="margin-top:14px">
            <input type="checkbox" id="terms" />
            <label for="terms">I agree to Selwa's <a href="terms.html">Terms of Service</a>, <a href="terms.html">Privacy Policy</a>, and <a href="terms.html">Artisan Pledge</a>. I
              understand my purchase supports Bhutanese artisans directly.</label>
          </div>

          <button type="submit" class="auth-submit">Create account</button>

        </form>


        <div class="auth-switch">
          Already have an account? <a href="login.html">Sign in</a>
        </div>

        <div class="text-center mt-4">
          <a href="index.html" style="font-size:0.8rem;color:var(--text-muted)">
            <i class="bi bi-arrow-left me-1"></i>Back to Selwa
          </a>
        </div>

      </div>
    </div>

  </div><!-- /auth-page -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../javascript/global.js"></script>
  <script src="../javascript/auth.js"></script>
</body>

</html>
