<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Selwa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/hi.css">

</head>
<body>

<div class="auth-page">

  <!-- ── Left decorative panel ── -->
  <div class="auth-panel col-md-5 col-lg-4 d-none d-md-flex">
    <div class="auth-panel-logo">Selwa</div>
    <div class="auth-panel-tagline">Authentic Bhutanese Crafts</div>
    <div class="auth-panel-quote">"Each thread tells the story of a mountain, a season, a life well lived."</div>
    <div class="auth-panel-quote-author">— Bhutanese artisians tradition</div>
  </div>

  <!-- ── Right form panel ── -->
  <div class="auth-form-panel col-12 col-md-7 col-lg-8">
    <div class="auth-form-inner">

      <!-- Mobile logo -->
      <div class="auth-mobile-logo">Selwa</div>

      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>

      <form id="forgot-password-form" novalidate>

        <!-- Email -->
        <div class="mb-3">
          <label class="auth-label" for="forgot-email">Email address</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" id="forgot-email" class="auth-input with-icon" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>

        <button type="submit" class="auth-submit">Send reset link</button>

      </form>

      <div class="auth-switch">
        Remember your password? <a href="login.html">Sign in</a>
      </div>

      <div class="text-center mt-4">
        <a href="index.html" style="font-size:0.8rem;color:var(--text-muted)">
          <i class="bi bi-arrow-left me-1"></i>Back to Selwa
        </a>
      </div>

    </div>
  </div>

</div><!-- /auth-page -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../javascript/global.js"></script>
<script src="../javascript/auth.js"></script>
</body>
</html>
