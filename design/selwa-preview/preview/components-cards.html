<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FAF7F2; padding: 20px; font-family: 'DM Sans', sans-serif; }
  .cards { display: flex; gap: 14px; flex-wrap: wrap; }
  .p-card { background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 1px 3px rgba(44,26,6,.06),0 1px 8px rgba(44,26,6,.03); border:1px solid #E2D8C8; width:180px; flex-shrink:0; display:flex; flex-direction:column; }
  .p-card__img { position:relative; background:#F4EDE0; aspect-ratio:1/1; overflow:hidden; }
  .p-card__img img { width:100%; height:100%; object-fit:cover; }
  .p-card__cat { position:absolute; top:8px; left:8px; font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; background:rgba(15,10,5,.72); color:#EDD09A; border-radius:9999px; padding:3px 9px; }
  .p-card__body { padding:12px 14px 14px; flex:1; display:flex; flex-direction:column; }
  .p-card__name { font-family:'Playfair Display',serif; font-size:.88rem; font-weight:600; color:#1C1208; margin-bottom:3px; line-height:1.3; }
  .p-card__by { font-size:.68rem; color:#B8A080; margin-bottom:8px; }
  .p-card__foot { display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px; border-top:1px solid #E2D8C8; }
  .p-card__price { font-family:'Playfair Display',serif; font-size:.92rem; font-weight:700; color:#5C3A10; }
  .btn-add { background:#F4EDE0; color:#9A5C12; border:1.5px solid #EAE0CE; border-radius:9999px; font-size:.72rem; font-weight:600; padding:5px 11px; cursor:pointer; font-family:'DM Sans',sans-serif; }
</style>
</head>
<body>
  <div class="cards">
    <div class="p-card">
      <div class="p-card__img">
        <img src="../assets/himalayan-tea.avif" alt="Himalayan Tea">
        <span class="p-card__cat">Wellness</span>
      </div>
      <div class="p-card__body">
        <div class="p-card__name">Himalayan Tea</div>
        <div class="p-card__by">By Karma Wangmo, Bumthang</div>
        <div class="p-card__foot">
          <span class="p-card__price">Nu. 1,200</span>
          <button class="btn-add">Add</button>
        </div>
      </div>
    </div>
    <div class="p-card">
      <div class="p-card__img">
        <img src="../assets/honey-bumthang.avif" alt="Bumthang Honey">
        <span class="p-card__cat">Food</span>
      </div>
      <div class="p-card__body">
        <div class="p-card__name">Bumthang Honey</div>
        <div class="p-card__by">By Tashi Dorji, Bumthang</div>
        <div class="p-card__foot">
          <span class="p-card__price">Nu. 850</span>
          <button class="btn-add">Add</button>
        </div>
      </div>
    </div>
    <div class="p-card">
      <div class="p-card__img">
        <img src="../assets/bangchung.avif" alt="Bangchung">
        <span class="p-card__cat">Crafts</span>
      </div>
      <div class="p-card__body">
        <div class="p-card__name">Bangchung</div>
        <div class="p-card__by">By Pema Lhamo, Trashigang</div>
        <div class="p-card__foot">
          <span class="p-card__price">Nu. 3,400</span>
          <button class="btn-add">Add</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
