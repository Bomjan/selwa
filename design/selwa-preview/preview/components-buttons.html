<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FAF7F2; padding: 22px; font-family: 'DM Sans', sans-serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .label { font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #B8A080; margin-bottom: 8px; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border-radius:9999px; font-size:.875rem; font-weight:600; border:none; cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; letter-spacing:.01em; line-height:1; text-decoration:none; padding:10px 22px; }
  .btn-sm { padding:7px 16px; font-size:.8rem; }
  .btn-gold { background:#B8701A; color:#fff; }
  .btn-outline-light { background:transparent; border:1.5px solid rgba(255,255,255,.4); color:#fff; }
  .btn-outline-dark { background:transparent; border:1.5px solid #B8701A; color:#B8701A; }
  .btn-dark { background:#1C1208; color:#EDD09A; }
  .btn-add { background:#F4EDE0; color:#9A5C12; border:1.5px solid #EAE0CE; font-size:.78rem; padding:6px 14px; }
  .dark-bg { background:#1C1208; padding:12px 16px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
</style>
</head>
<body>
  <div class="label">Primary</div>
  <div class="row">
    <button class="btn btn-gold">Shop now</button>
    <button class="btn btn-gold btn-sm">Add to cart</button>
  </div>
  <div class="label">Outline Dark (on cream)</div>
  <div class="row">
    <button class="btn btn-outline-dark">Meet artisans</button>
    <button class="btn btn-outline-dark btn-sm">See all</button>
  </div>
  <div class="label">Outline Light (on dark)</div>
  <div class="dark-bg">
    <button class="btn btn-outline-light">Learn more</button>
    <button class="btn btn-dark">Join as artisan</button>
  </div>
  <div class="label" style="margin-top:14px">Add-to-cart (compact)</div>
  <div class="row">
    <button class="btn btn-add">Add</button>
    <button class="btn btn-add">+ Add to cart</button>
  </div>
</body>
</html>
