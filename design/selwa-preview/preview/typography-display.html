<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FAF7F2; padding: 24px 28px; }
  .label { font-family: system-ui, sans-serif; font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #B8A080; margin-bottom: 4px; }
  .row { margin-bottom: 16px; border-bottom: 1px solid #E2D8C8; padding-bottom: 16px; }
  .row:last-child { border-bottom: none; margin-bottom: 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Hero — italic 500</div>
    <div style="font-family:'Playfair Display',serif; font-size:2.4rem; font-weight:500; font-style:italic; line-height:1.15; letter-spacing:-.015em; color:#fff; background:#0F0A05; padding:16px 20px; border-radius:10px;">Discover the art of Bhutan</div>
  </div>
  <div class="row">
    <div class="label">H1 — regular 600</div>
    <div style="font-family:'Playfair Display',serif; font-size:2rem; font-weight:600; line-height:1.2; color:#1C1208;">Himalayan Artisan Marketplace</div>
  </div>
  <div class="row">
    <div class="label">H2 — regular 600</div>
    <div style="font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:600; line-height:1.2; color:#1C1208;">Featured products</div>
  </div>
  <div class="row">
    <div class="label">H3 — regular 600</div>
    <div style="font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:600; color:#1C1208;">Kishuthara silk fabric</div>
  </div>
  <div class="row">
    <div class="label">Price — bold 700</div>
    <div style="font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:#5C3A10;">Nu. 4,500</div>
  </div>
</body>
</html>
