<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FAF7F2; font-family: 'DM Sans', sans-serif; padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 80px; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(44,26,6,.1); }
  .swatch__color { height: 60px; }
  .swatch__label { padding: 8px 10px; background: #fff; }
  .swatch__name { font-size: .68rem; font-weight: 600; color: #2C1A06; display: block; }
  .swatch__hex  { font-size: .62rem; color: #8B6040; }
  .group-label { font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #B8A080; margin: 14px 0 6px; }
</style>
</head>
<body>
  <div class="group-label">Gold — Primary Accent</div>
  <div class="row">
    <div class="swatch"><div class="swatch__color" style="background:#9A5C12"></div><div class="swatch__label"><span class="swatch__name">gold-deep</span><span class="swatch__hex">#9A5C12</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#B8701A"></div><div class="swatch__label"><span class="swatch__name">gold</span><span class="swatch__hex">#B8701A</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#D4920A"></div><div class="swatch__label"><span class="swatch__name">gold-warm</span><span class="swatch__hex">#D4920A</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#EDD09A"></div><div class="swatch__label"><span class="swatch__name">gold-pale</span><span class="swatch__hex">#EDD09A</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#FAF1E2"></div><div class="swatch__label"><span class="swatch__name">gold-mist</span><span class="swatch__hex">#FAF1E2</span></div></div>
  </div>
  <div class="group-label">Cream — Backgrounds</div>
  <div class="row">
    <div class="swatch"><div class="swatch__color" style="background:#FAF7F2; border:1px solid #E2D8C8"></div><div class="swatch__label"><span class="swatch__name">cream</span><span class="swatch__hex">#FAF7F2</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#F4EDE0"></div><div class="swatch__label"><span class="swatch__name">cream-2</span><span class="swatch__hex">#F4EDE0</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#EAE0CE"></div><div class="swatch__label"><span class="swatch__name">cream-3</span><span class="swatch__hex">#EAE0CE</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#DDD0B8"></div><div class="swatch__label"><span class="swatch__name">cream-4</span><span class="swatch__hex">#DDD0B8</span></div></div>
  </div>
</body>
</html>
