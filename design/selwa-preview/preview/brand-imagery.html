<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #1C1208; padding: 20px; font-family: 'DM Sans', sans-serif; }
  .label { font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #7A5535; margin: 14px 0 8px; }
  .label:first-child { margin-top: 0; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .img-card { border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; }
  .img-card img { width: 100%; height: 100%; object-fit: cover; }
  .img-card--wide { grid-column: span 2; aspect-ratio: 2/1; }
  .cap { font-size: .65rem; color: #7A5535; margin-top: 5px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="label">Product Photography</div>
  <div class="grid">
    <div>
      <div class="img-card"><img src="../assets/himalayan-tea.avif" alt="Himalayan Tea"></div>
      <div class="cap">Himalayan Tea</div>
    </div>
    <div>
      <div class="img-card"><img src="../assets/honey-bumthang.avif" alt="Bumthang Honey"></div>
      <div class="cap">Bumthang Honey</div>
    </div>
    <div>
      <div class="img-card"><img src="../assets/bangchung.avif" alt="Bangchung"></div>
      <div class="cap">Bangchung</div>
    </div>
    <div>
      <div class="img-card"><img src="../assets/cordyceps.avif" alt="Cordyceps"></div>
      <div class="cap">Cordyceps</div>
    </div>
    <div>
      <div class="img-card"><img src="../assets/incense-stick.avif" alt="Incense"></div>
      <div class="cap">Incense Stick</div>
    </div>
    <div>
      <div class="img-card"><img src="../assets/palang.avif" alt="Palang"></div>
      <div class="cap">Palang</div>
    </div>
  </div>
  <div class="label" style="margin-top:16px">Brand / Storefront</div>
  <div class="grid">
    <div class="img-card--wide">
      <div class="img-card" style="aspect-ratio:2/1"><img src="../assets/selwa.bt.jpeg" alt="Selwa Storefront" style="object-position:center top"></div>
    </div>
    <div>
      <div class="img-card"><img src="../assets/gift.webp" alt="Gift"></div>
      <div class="cap">Gift packaging</div>
    </div>
  </div>
</body>
</html>
