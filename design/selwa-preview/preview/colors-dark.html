<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FAF7F2; font-family: 'DM Sans', sans-serif; padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 80px; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(44,26,6,.1); }
  .swatch__color { height: 60px; }
  .swatch__label { padding: 8px 10px; background: #fff; }
  .swatch__name { font-size: .68rem; font-weight: 600; color: #2C1A06; display: block; }
  .swatch__hex  { font-size: .62rem; color: #8B6040; }
  .group-label { font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #B8A080; margin: 14px 0 6px; }
</style>
</head>
<body>
  <div class="group-label">Ink — Dark Surfaces</div>
  <div class="row">
    <div class="swatch"><div class="swatch__color" style="background:#0F0A05"></div><div class="swatch__label"><span class="swatch__name">ink</span><span class="swatch__hex">#0F0A05</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#1C1208"></div><div class="swatch__label"><span class="swatch__name">ink-2</span><span class="swatch__hex">#1C1208</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#3D2008"></div><div class="swatch__label"><span class="swatch__name">bark</span><span class="swatch__hex">#3D2008</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#5C3A10"></div><div class="swatch__label"><span class="swatch__name">bark-mid</span><span class="swatch__hex">#5C3A10</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#8B6040"></div><div class="swatch__label"><span class="swatch__name">bark-light</span><span class="swatch__hex">#8B6040</span></div></div>
  </div>
  <div class="group-label">On-Dark Text</div>
  <div class="row" style="background:#1C1208; padding:10px; border-radius:10px;">
    <div class="swatch"><div class="swatch__color" style="background:#EEE4CC"></div><div class="swatch__label"><span class="swatch__name">on-dark</span><span class="swatch__hex">#EEE4CC</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#C8A070"></div><div class="swatch__label"><span class="swatch__name">on-dark-2</span><span class="swatch__hex">#C8A070</span></div></div>
    <div class="swatch"><div class="swatch__color" style="background:#7A5535"></div><div class="swatch__label"><span class="swatch__name">on-dark-3</span><span class="swatch__hex">#7A5535</span></div></div>
  </div>
</body>
</html>
